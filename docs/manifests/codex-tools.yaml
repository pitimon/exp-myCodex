# Public Codex-adjacent tool handoff manifest.
#
# Use plugin manifests for Codex plugins. Use this file for CLI tools that are
# useful around Codex but are not installed through `codex plugin`.

tools:
  - name: rtk
    display_name: RTK - Rust Token Killer
    package_manager: Homebrew
    package: rtk
    verified_version: "0.42.3"
    homepage: https://www.rtk-ai.app/
    license: Apache-2.0
    runbook: docs/runbooks/tools/rtk.md
    install:
      - brew install rtk
    smoke_tests:
      - rtk --version
      - rtk gain
      - rtk proxy echo ok

  - name: tokentracker
    display_name: TokenTracker CLI
    package: "@ipv9/tokentracker-cli"
    verified_version: "0.39.6"
    npm_url: https://www.npmjs.com/package/@ipv9/tokentracker-cli
    repository: https://github.com/pitimon/TokenTracker
    binaries:
      - tokentracker
      - tracker
      - tokentracker-cli
      - tokentracker-tracker
    node: ">=20"
    runbook: docs/runbooks/tools/tokentracker.md
    dashboard_command:
      - npx --yes @ipv9/tokentracker-cli serve --sync --no-open --port 7680
    sync_command:
      - npx --yes @ipv9/tokentracker-cli sync --auto
    smoke_tests:
      - npx --yes @ipv9/tokentracker-cli --help
      - npx --yes @ipv9/tokentracker-cli status
      - npx --yes @ipv9/tokentracker-cli doctor --json
