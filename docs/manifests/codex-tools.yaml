# Public Codex-adjacent tool handoff manifest.
#
# Use plugin manifests for Codex plugins. Use this file for CLI tools that are
# useful around Codex but are not installed through `codex plugin`.

tools:
  - name: meta-loop-control
    display_name: Meta-Loop Control Ledger
    package: workflow-only
    verified_version: "1"
    runbook: docs/runbooks/tools/meta-loop.md
    validation_prompt: docs/prompts/meta-loop-validation-prompt.md
    cli_discovery: >-
      `--help` prints usage to stdout and exits zero. A missing or invalid
      action prints usage to stderr and exits nonzero.
    smoke_tests:
      - node scripts/meta-loop-control.cjs --help
      - node scripts/meta-loop-control.cjs validate-packet --packet <packet.json>
      - node scripts/meta-loop-control.cjs claim --ledger <temporary-ledger.json> --packet <packet.json> --worker <worker-id> --capacity 1 --expires-at 2099-01-01T00:00:00.000Z
      - node scripts/meta-loop-control.cjs confirm-spawn --ledger <temporary-ledger.json> --worker <worker-id> --attestation <non-sensitive-label>
      - node scripts/meta-loop-control.cjs record-return --ledger <temporary-ledger.json> --worker <worker-id> --attestation <non-sensitive-label> --result <non-sensitive-result>
      - node scripts/meta-loop-control.cjs synthesize --ledger <temporary-ledger.json>
      - node scripts/meta-loop-control.cjs finish --ledger <temporary-ledger.json>

  - name: changes-log-bridge
    display_name: CHANGES.log Bridge Pattern
    package_manager:
      - userspace config
      - git global excludesfile
    package: workflow-only
    verified_version: "2026-06-22"
    credit: Dheeraj Sharma & Wyndo, The AI Maker
    runbook: docs/runbooks/tools/changes-log-bridge.md
    smoke_tests:
      - python3 -c "import tomllib,pathlib; d=tomllib.load(open(pathlib.Path.home()/'.codex/config.toml','rb')); print(d.get('project_doc_fallback_filenames'))"
      - git check-ignore -v CHANGES.log
      - git status --short --ignored -- CHANGES.log
      - tail -40 CHANGES.log
      - git diff --name-only
      - git config --get core.hooksPath || true
      - compare ~/.claude/CLAUDE.md and ~/.codex/AGENTS.md bridge sections

  - name: obsidian
    display_name: Obsidian second-brain workflow
    package_manager:
      - manual app install
      - filesystem MCP server
    package: obsidian
    verified_version: workflow-only
    homepage: https://obsidian.md/
    runbook: docs/runbooks/tools/obsidian.md
    smoke_tests:
      - test -d "<vault>/Claude-Mem/Projects/<project>"
      - node ~/.codex/scripts/obsidian-project-index.cjs <project>
      - rg -n "<note-title>|<note-slug>" "<vault>/Claude-Mem/Projects/<project>/Index.md"

  - name: rtk
    display_name: RTK - Rust Token Killer
    package_manager:
      - Homebrew
      - official release installer
    package: rtk
    verified_version: "0.42.3"
    homepage: https://www.rtk-ai.app/
    license: Apache-2.0
    runbook: docs/runbooks/tools/rtk.md
    install:
      - brew install rtk
      - curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/master/install.sh -o /tmp/rtk-install.sh
      - RTK_VERSION=v0.42.3 sh /tmp/rtk-install.sh
    smoke_tests:
      - rtk --version
      - rtk gain
      - rtk proxy echo ok

  - name: tokentracker
    display_name: TokenTracker CLI
    package: "@ipv9/tokentracker-cli"
    verified_version: "0.39.13"
    npm_url: https://www.npmjs.com/package/@ipv9/tokentracker-cli
    repository: https://github.com/pitimon/TokenTracker
    binaries:
      - tokentracker
      - tracker
      - tokentracker-cli
      - tokentracker-tracker
    node: ">=20"
    runbook: docs/runbooks/tools/tokentracker.md
    service_models:
      - Ubuntu/Linux systemd --user service
      - macOS LaunchAgent
      - Windows PowerShell Scheduled Task
      - WSL systemd or Windows Scheduled Task wrapper
    dashboard_command:
      - npx --yes @ipv9/tokentracker-cli serve --sync --no-open --port 7680
    sync_command:
      - npx --yes @ipv9/tokentracker-cli sync --auto
    smoke_tests:
      - node --version
      - npm view @ipv9/tokentracker-cli version bin engines dist-tags --json
      - npx --yes @ipv9/tokentracker-cli --help
      - npx --yes @ipv9/tokentracker-cli status
      - npx --yes @ipv9/tokentracker-cli doctor --json
      - service manager reports dashboard running when background mode is enabled
      - curl or Invoke-WebRequest returns HTTP 200 from http://127.0.0.1:<port>/
