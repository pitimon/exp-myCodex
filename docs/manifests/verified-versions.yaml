# Versions last captured from the source workstation runbook set.
# Re-check on the target workstation after install/update.

verified_at: "2026-06-22"
plugins:
  claude-mem:
    selector: claude-mem@claude-mem-local
    version: "13.8.0"
    ref: v13.8.0
    notes:
      - Codex overlay available under overlays/claude-mem/13.8.0/
      - Version 13.8.0 overlay removes Codex-rejected hook metadata, restores .install-version, restores scripts/codex-hook-output-filter.js, filters duplicate SessionStart context, and pins hook resolver order to 13.8.0 Codex/local roots before older Claude cache fallbacks.
      - claude-mem is pinned to a patched local v13.8.0 snapshot on the source workstation; apply overlays only when the active cache version exactly matches the overlay directory.
      - Issues #5, #6, and #8 remain the living field-observation threads for marketplace refresh drift, schema drift, user-level hooks, missing marker/filter files, upgrade gaps, and lifecycle smoke failures.
      - Historical overlays remain available for exact 13.4.x and 13.6.2 runtimes, but must not be copied forward.
      - Run post-install verification and fresh startup/tool-triggering codex exec smokes before calling healthy.

  8-habit-ai-dev:
    selector: 8-habit-ai-dev@pitimon-8-habit-ai-dev
    version: "2.21.10"
    notes:
      - Profile and skills load at Codex startup when plugin is enabled.
      - Re-verified from the active Codex cache on a Linux test workstation.

  claude-governance:
    selector: claude-governance@pitimon-claude-governance
    version: "3.4.1"
    release: https://github.com/pitimon/claude-governance/releases/tag/v3.4.1
    notes:
      - Governance skills load at Codex startup when plugin is enabled.
      - v3.4.1 release is public and fixes Linux Claude Code install compatibility.

tools:
  changes-log-bridge:
    package: workflow-only
    version: "2026-06-22"
    runbook: docs/runbooks/tools/changes-log-bridge.md
    notes:
      - Documents the userspace Bridge Protocol for ~/.claude/CLAUDE.md and ~/.codex/AGENTS.md.
      - Codex fallback requires top-level project_doc_fallback_filenames = ["CLAUDE.md"] in ~/.codex/config.toml.
      - CHANGES.log should be ignored through the configured global git excludesfile.
      - End-to-end proof is CC appending, Codex reading, then Codex appending without overwriting.

  obsidian:
    package: obsidian
    version: workflow-only
    homepage: https://obsidian.md/
    notes:
      - Obsidian is an optional curated second-brain layer, not a requirement for claude-mem health.
      - The verified workflow separates raw inbox captures from curated project notes.
      - Project notes should be date-stamped, source-backed, linked from Index.md, and free of secrets or raw transcript dumps.

  rtk:
    package: rtk
    package_manager:
      - Homebrew
      - official release installer
    version: "0.42.3"
    homepage: https://www.rtk-ai.app/
    notes:
      - Homebrew install verified on macOS.
      - Official release installer verified on Linux and WSL-style environments.
      - rtk gain was verified against local command-history savings.

  tokentracker:
    package: "@ipv9/tokentracker-cli"
    version: "0.39.6"
    source: pitimon/TokenTracker
    notes:
      - npm view returned public package metadata.
      - Package exposes tokentracker, tracker, tokentracker-cli, and tokentracker-tracker binaries.
