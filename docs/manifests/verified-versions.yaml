# Versions last captured from the source workstation runbook set.
# Re-check on the target workstation after install/update.

verified_at: "2026-06-22"
plugins:
  claude-mem:
    selector: claude-mem@claude-mem-local
    version: "13.8.0"
    ref: v13.8.0
    notes:
      - Codex overlay available under overlays/claude-mem/13.8.0/
      - Version 13.8.0 overlay removes Codex-rejected hook metadata, restores .install-version, restores scripts/codex-hook-output-filter.js, filters duplicate SessionStart context, and pins hook resolver order to 13.8.0 Codex/local roots before older Claude cache fallbacks.
      - claude-mem is pinned to a patched local v13.8.0 snapshot on the source workstation; apply overlays only when the active cache version exactly matches the overlay directory.
      - Issues #5, #6, and #8 remain the living field-observation threads for marketplace refresh drift, schema drift, user-level hooks, missing marker/filter files, upgrade gaps, and lifecycle smoke failures.
      - Historical overlays remain available for exact 13.4.x and 13.6.2 runtimes, but must not be copied forward.
      - Run post-install verification and fresh startup/tool-triggering codex exec smokes before calling healthy.
    compatibility_policy:
      reviewed_overlay_versions:
        - "13.4.0"
        - "13.4.1"
        - "13.4.2"
        - "13.6.2"
        - "13.8.0"
      exact_match_required: true
      record_separately:
        - active Codex plugin version and path
        - claude-mem worker version and path
        - selected overlay version or missing-overlay state
      evidence_record_format:
        required_fields:
          - state (reviewed-exact-match|discovery-no-mutation|supported-with-failure)
          - active_plugin_version
          - active_plugin_path
          - worker_version_or_unknown
          - worker_path_or_unknown
          - overlay (exact-version|missing_for_version:<version>|not-applied)
          - verification (passed|failed|not-run)
          - relevant_errata (issue numbers or none)
        report_example: >-
          claude_mem_evidence={state=<state>;active_plugin_version=<version>;
          active_plugin_path=<path>;worker_version=<version|unknown>;
          worker_path=<path|unknown>;overlay=<state>;
          verification=<passed|failed|not-run>;relevant_errata=<issues|none>}
      state_transitions:
        exact_overlay_found: Enter reviewed-exact-match before a matching overlay is applied.
        exact_match_verified: Exit reviewed-exact-match as healthy only after complete verification passes.
        exact_match_failed: Move from reviewed-exact-match to supported-with-failure; stop mutation and report failed evidence.
        overlay_missing: Enter discovery-no-mutation; collect discovery evidence and do not patch or copy an older overlay.
        discovery_complete: Exit discovery-no-mutation only with a report; it is neither healthy nor an authorization to mutate.
        future_retry: A later retry starts again from detected active versions and chooses one state anew.
      exact_match_action: Use only the matching overlay and run its complete verification.
      version_drift_action: Do not mutate plugin files. Run the runbook discovery checks, report overlay=missing_for_version:<version>, and use only relevant live errata as diagnostic context.
      live_errata:
        issues: [5, 6, 8]
        consult_when:
          - active version has no exact reviewed overlay
          - a matching overlay does not resolve a hook, worker, MCP, or lifecycle-smoke failure
          - the runbook baseline predates a newly observed target symptom

  8-habit-ai-dev:
    selector: 8-habit-ai-dev@pitimon-8-habit-ai-dev
    version: "2.21.10"
    notes:
      - Profile and skills load at Codex startup when plugin is enabled.
      - Re-verified from the active Codex cache on a Linux test workstation.

  claude-governance:
    selector: claude-governance@pitimon-claude-governance
    version: "3.4.1"
    release: https://github.com/pitimon/claude-governance/releases/tag/v3.4.1
    notes:
      - Governance skills load at Codex startup when plugin is enabled.
      - v3.4.1 release is public and fixes Linux Claude Code install compatibility.

tools:
  changes-log-bridge:
    package: workflow-only
    version: "2026-06-22"
    runbook: docs/runbooks/tools/changes-log-bridge.md
    notes:
      - Documents the userspace Bridge Protocol for ~/.claude/CLAUDE.md and ~/.codex/AGENTS.md.
      - Codex fallback requires top-level project_doc_fallback_filenames = ["CLAUDE.md"] in ~/.codex/config.toml.
      - CHANGES.log should be ignored through the configured global git excludesfile and proven with git check-ignore -v plus git status --short --ignored -- CHANGES.log.
      - Compare the latest CHANGES.log entry with git status --short and git diff --name-only before declaring handoff current.
      - Report git config --get core.hooksPath separately when repo-tracked hooks are present; the Bridge Protocol does not install or replace hooks.
      - End-to-end proof is CC appending, Codex reading, then Codex appending without overwriting.

  obsidian:
    package: obsidian
    version: workflow-only
    homepage: https://obsidian.md/
    notes:
      - Obsidian is an optional curated second-brain layer, not a requirement for claude-mem health.
      - The verified workflow separates raw inbox captures from curated project notes.
      - Project notes should be date-stamped, source-backed, linked from Index.md, and free of secrets or raw transcript dumps.

  rtk:
    package: rtk
    package_manager:
      - Homebrew
      - official release installer
    version: "0.42.3"
    homepage: https://www.rtk-ai.app/
    notes:
      - Homebrew install verified on macOS.
      - Official release installer verified on Linux and WSL-style environments.
      - rtk gain was verified against local command-history savings.

  tokentracker:
    package: "@ipv9/tokentracker-cli"
    version: "0.39.13"
    source: pitimon/TokenTracker
    notes:
      - npm view and upstream package.json returned public package metadata for 0.39.13.
      - Package exposes tokentracker, tracker, tokentracker-cli, and tokentracker-tracker binaries.
      - Background service options are documented for Ubuntu/Linux systemd user services, macOS LaunchAgent, Windows PowerShell Scheduled Tasks, and WSL.
      - Field QA covered Ubuntu with nvm-backed Node 24 and Windows 10 PowerShell 5.1; service checks must verify the service environment path, not only the interactive shell.
      - Windows PowerShell Scheduled Task examples use DontStopIfGoingOnBatteries for PowerShell 5.1 compatibility.
